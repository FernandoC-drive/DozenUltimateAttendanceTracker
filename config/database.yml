default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "postgres" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "d_uattendandance_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_TEST_NAME") { "d_uattendandance_test" } %>

# --- HEROKU CONFIGURATION ---
# Heroku ignores the username/password fields above and looks strictly
# for the "DATABASE_URL" environment variable, which it provides automatically.
production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV.fetch("DATABASE_URL", "") %>
